name: Build Stable Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish, such as v1.19.0"
        required: true
        default: "v1.19.0"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build install bundle
        shell: pwsh
        run: ./mod-prototype/build-release-bundle.ps1

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          files: mod-prototype/dist/LongYinPlus-InstallBundle-*.zip
          generate_release_notes: true
