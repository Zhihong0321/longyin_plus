## Settings file was created by plugin LongYin Stamina Lock v1.27.9
## Plugin GUID: codex.longyin.staminalock

[Battle]

## Multiplies the selected in-battle speed option.
# Setting type: Int32
# Default value: 2
SpeedMultiplier = 2

[CharacterCreation]

## Multiplies the remaining point pools during character creation.
# Setting type: Int32
# Default value: 1
PointMultiplier = 3

[Commerce]

## Minimum cash carried by NPC shop merchants while a Shop trade window is open. Set to 0 to disable.
# Setting type: Int32
# Default value: 100000
MerchantCarryCash = 100000

[Craft]

## Uses the picked craft result as the base item, then regenerates it toward the next major tier.
# Setting type: Boolean
# Default value: true
RandomPickUpgrade = true

[DailySkillInsight]

## Chance from 0 to 100 that each elapsed in-game day grants bonus skill EXP to one eligible martial skill.
# Setting type: Int32
# Default value: 0
HitChancePercent = 100

## Percent of the skill's current-level max EXP to grant when the bonus triggers.
# Setting type: Single
# Default value: 5
ExpPercent = 25

## When true, multiplies the bonus by the skill's rarity EXP rate.
# Setting type: Boolean
# Default value: true
UseRarityScaling = true

## When above 0, grants the same bonus every X real-time seconds while in game. Useful for testing.
# Setting type: Single
# Default value: 0
RealtimeIntervalSeconds = 25

[Debate]

## Multiplies debate damage dealt to the player side when a round is lost.
# Setting type: Single
# Default value: 1
PlayerDamageTakenMultiplier = 1

## Multiplies debate damage dealt to the enemy side when a round is won.
# Setting type: Single
# Default value: 1
EnemyDamageTakenMultiplier = 3

[Debug]

## Logs targeted date progression hooks for validation.
# Setting type: Boolean
# Default value: false
TraceMode = false

[Drink]

## Multiplies Qi cost paid by the player side during the drinking minigame.
# Setting type: Single
# Default value: 1
PlayerPowerCostMultiplier = 1

## Multiplies Qi cost paid by the enemy side during the drinking minigame.
# Setting type: Single
# Default value: 1
EnemyPowerCostMultiplier = 3

[Exploration]

## Prevents exploration stamina from decreasing.
# Setting type: Boolean
# Default value: true
LockStamina = true

## Legacy compatibility toggle for the old per-move reveal experiment. No longer used.
# Setting type: Boolean
# Default value: false
RevealExtraFogOnMove = false

## Legacy compatibility value for the old per-move reveal experiment. No longer used.
# Setting type: Int32
# Default value: 2
MoveRevealRadius = 2

## Reveal the whole exploration map once, after the first completed move in each exploration run.
# Setting type: Boolean
# Default value: true
RevealAllOnStepTile = true

## When true, exploration treasure chests show several reward items and let you choose 1.
# Setting type: Boolean
# Default value: true
TreasureChestChoiceEnabled = true

## How many reward options each exploration treasure chest should show when choice mode is enabled.
# Setting type: Int32
# Default value: 3
TreasureChestChoiceOptions = 5

## Total item rewards to grant from exploration treasure chests. Set to 1 for vanilla behavior.
# Setting type: Int32
# Default value: 2
TreasureChestTotalItems = 1

[Inventory]

## Minimum carry-weight cap applied to the player inventory. Set to 0 to disable.
# Setting type: Single
# Default value: 100000
CarryWeightCap = 100000

## When true, forces the player inventory's current carried weight to 0.
# Setting type: Boolean
# Default value: false
IgnoreCarryWeight = false

[MoneyLuck]

## Chance from 0 to 100 that a player money transaction triggers a lucky bonus.
# Setting type: Int32
# Default value: 0
LuckyHitChancePercent = 60

[ReadBook]

## Multiplies EXP gained from reading books.
# Setting type: Int32
# Default value: 1
ExpMultiplier = 25

[Relationship]

## Chance from 0 to 100 that positive relationship gain becomes double.
# Setting type: Int32
# Default value: 0
ExtraRelationshipGainChancePercent = 80

[SkillTalent]

Enabled = True

LevelThreshold = 10

TierPointMultiplier = 2

PlayerOnly = True

[Teaching]

## When the player teaches martial-skill EXP to a same-sect NPC, other same-sect NPCs in the same area who already know that skill also gain EXP.
# Setting type: Boolean
# Default value: true
SameSectAreaShareEnabled = true

## Minimum percent of the original taught EXP shared to each additional same-sect NPC in the area.
# Setting type: Int32
# Default value: 80
SameSectAreaShareMinPercent = 80

## Maximum percent of the original taught EXP shared to each additional same-sect NPC in the area.
# Setting type: Int32
# Default value: 120
SameSectAreaShareMaxPercent = 120

[Time]

## Blocks in-game day, month, and year progression.
# Setting type: Boolean
# Default value: false
FreezeDate = false

